<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 통합 지원포털</title>
    <script src="https://unpkg.com/hangul-js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        :root { --primary: #1e3a8a; --bg: #f8fafc; --border: #e2e8f0; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; color: #0f172a; line-height: 1.5; }
        .container { max-width: 800px; margin: 0 auto; background: white; min-height: 100vh; }

        /* 메인 탭 */
        .main-tabs { display: flex; background: #fff; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .m-tab { flex: 1; text-align: center; padding: 15px; cursor: pointer; font-weight: 800; color: #64748b; }
        .m-tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        /* 서브 카테고리 탭 (전화번호부용) */
        .sub-tabs { display: flex; overflow-x: auto; padding: 10px; gap: 8px; background: #fff; border-bottom: 1px solid var(--border); }
        .sub-tabs::-webkit-scrollbar { display: none; }
        .s-tab { white-space: nowrap; padding: 6px 14px; background: #f1f5f9; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); }
        .s-tab.active { background: var(--primary); color: white; border-color: var(--primary); }

        .content { padding: 15px; }
        .search-box { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; font-size: 16px; }

        /* [전화번호 아이템] */
        .phone-item { border-bottom: 1px solid #f1f5f9; padding: 12px 0; display: flex; flex-direction: column; }
        .top-line { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .name-area { width: 140px; font-weight: 800; font-size: 15px; color: #1e293b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .num-area { flex: 1; text-align: right; padding-right: 10px; font-weight: 700; color: #334155; font-size: 14px; }
        .icon-area { width: 75px; min-width: 75px; display: flex; justify-content: flex-end; gap: 5px; } /* 영역 고정 */
        .btn-icon { text-decoration: none; background: #f8fafc; color: #475569; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: 800; font-size: 11px; border: 1px solid var(--border); }
        .btn-m { background: #ecfdf5; color: #059669; border-color: #d1fae5; }
        .work-text { font-size: 12px; color: #10b981; font-weight: 600; margin-top: 4px; }

        /* [대관 디자인] */
        .view-controls { display: flex; justify-content: flex-end; gap: 5px; margin-bottom: 10px; }
        .v-btn { padding: 4px 10px; font-size: 12px; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; background: #fff; }
        .v-btn.active { background: #334155; color: white; }

        .building-header { font-size: 17px; font-weight: 800; color: #2e5077; margin: 20px 0 10px; border-left: 4px solid #2e5077; padding-left: 10px; }
        
        /* 대관 카드형 (모바일 최적화) */
        .res-card { border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 10px; background: white; position: relative; }
        .badge { position: absolute; top: 12px; right: 12px; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-y { background: #fff4e5; color: #b25e09; }
        .badge-n { background: #e8f0fe; color: #1967d2; }

        /* 대관 리스트형 (PC 최적화) */
        .res-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 20px; }
        .res-table th { background: #f1f5f9; padding: 10px; text-align: left; border-bottom: 2px solid var(--border); }
        .res-table td { padding: 10px; border-bottom: 1px solid var(--border); }

        @media (max-width: 600px) { .pc-only { display: none; } }
        @media (min-width: 601px) { .mo-only { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <div class="main-tabs">
        <div class="m-tab active" onclick="switchMainTab('tel')">📞 전화번호부</div>
        <div class="m-tab" onclick="switchMainTab('rent')">📱 모바일 대관</div>
    </div>

    <div id="sec-tel">
        <div class="sub-tabs" id="subTabs"></div>
        <div class="content">
            <input type="text" id="phoneSearch" class="search-box" placeholder="성함, 부서, 업무, 초성 검색..." oninput="filterPhones()">
            <div id="phoneList"></div>
        </div>
    </div>

    <div id="sec-rent" style="display:none;">
        <div class="content">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="date" id="rentDate" class="search-box" style="margin:0;">
                <button onclick="renderRental()" style="background:var(--primary); color:white; border:none; border-radius:8px; padding:0 20px; font-weight:800;">조회</button>
            </div>
            <div class="view-controls">
                <button class="v-btn active" id="btn-card" onclick="setView('card')">카드형</button>
                <button class="v-btn" id="btn-list" onclick="setView('list')">리스트형</button>
            </div>
            <div id="rentalList"></div>
        </div>
    </div>
</div>

<script>
    // [데이터] 
    const phoneData = [
        {cat: "🚨 긴급/조치", dept: "전기팀", name: "", tel: "02-2258-5672", hp: "", work: "전기/누수(대량/소방)/저온실(공동)"},
        {cat: "🚨 긴급/조치", dept: "설비팀", name: "", tel: "02-2258-5624", hp: "", work: "개별 냉방기/누수/변기막힘/기자재"},
        {cat: "🚨 긴급/조치", dept: "통합관제", name: "", tel: "02-2258-5555", hp: "", work: "중앙 공조기/자동문/소방누수"},
        {cat: "🏢 행정/총무", dept: "비서실", name: "심지연", tel: "02-3147-8068", hp: "010-3445-0623", work: "사무처장 비서"},
        {cat: "🏢 행정/총무", dept: "영선팀", name: "", tel: "02-2258-5605", hp: "", work: "영선 업무 및 시설물 수리"},
        {cat: "🔒 보안/출입", dept: "보안실", name: "이용춘", tel: "02-3147-8300", hp: "010-6213-8502", work: "보안 총괄/수리 접수"},
        {cat: "🔒 보안/출입", dept: "셔틀버스", name: "", tel: "02-2258-6451", hp: "", work: "셔틀버스 운행 및 관리"}
    ];

    const rentalData = [
        {date: "2026-04-01", buNm: "성의회관", placeNm: "마리아홀", startTime: "09:00", endTime: "12:00", eventNm: "의학 세미나", status: "Y"},
        {date: "2026-04-01", buNm: "옴니버스 파크", placeNm: "L001호", startTime: "14:00", endTime: "17:00", eventNm: "기획회의", status: "N"}
    ];

    let currentCat = "전체";
    let currentView = window.innerWidth > 600 ? 'list' : 'card';

    // [기능: 메인 탭]
    function switchMainTab(type) {
        document.getElementById('sec-tel').style.display = type === 'tel' ? 'block' : 'none';
        document.getElementById('sec-rent').style.display = type === 'rent' ? 'block' : 'none';
        document.querySelectorAll('.m-tab').forEach((t, i) => t.classList.toggle('active', (i === 0 && type === 'tel') || (i === 1 && type === 'rent')));
    }

    // [기능: 전화번호부]
    function initSubTabs() {
        const cats = ["전체", ...new Set(phoneData.map(item => item.cat))];
        const container = document.getElementById('subTabs');
        container.innerHTML = cats.map(c => `<div class="s-tab ${c === '전체' ? 'active' : ''}" onclick="filterByCat('${c}')">${c}</div>`).join('');
    }

    function filterByCat(cat) {
        currentCat = cat;
        document.querySelectorAll('.s-tab').forEach(t => t.classList.toggle('active', t.innerText === cat));
        filterPhones();
    }

    function filterPhones() {
        const query = document.getElementById('phoneSearch').value.replace(/\s/g, "");
        const list = document.getElementById('phoneList');
        list.innerHTML = '';

        phoneData.filter(item => {
            const matchCat = currentCat === "전체" || item.cat === currentCat;
            const target = (item.name + item.dept + item.work).replace(/\s/g, "");
            return matchCat && Hangul.search(target, query) >= 0;
        }).forEach(r => {
            const dispNum = r.tel.replace("02-2258-", "").replace("02-3147-", "");
            list.insertAdjacentHTML('beforeend', `
                <div class="phone-item">
                    <div class="top-line">
                        <div class="name-area">${r.name || r.dept}</div>
                        <div class="num-area ${r.tel.includes('2258') ? 'special-navy' : ''}">${dispNum}</div>
                        <div class="icon-area">
                            ${r.tel ? `<a href="tel:${r.tel.replace(/-/g,'')}" class="btn-icon">T</a>` : '<div style="width:32px"></div>'}
                            ${r.hp ? `<a href="tel:${r.hp.replace(/-/g,'')}" class="btn-icon btn-m">M</a>` : '<div style="width:32px"></div>'}
                        </div>
                    </div>
                    <div class="work-text">${r.work}</div>
                </div>`);
        });
    }

    // [기능: 대관]
    function setView(view) {
        currentView = view;
        document.getElementById('btn-card').classList.toggle('active', view === 'card');
        document.getElementById('btn-list').classList.toggle('active', view === 'list');
        renderRental();
    }

    function renderRental() {
        const date = document.getElementById('rentDate').value;
        const list = document.getElementById('rentalList');
        list.innerHTML = '';

        ["성의회관", "의생명산업연구원", "옴니버스 파크"].forEach(bu => {
            const daily = rentalData.filter(d => d.date === date && d.buNm.includes(bu));
            list.insertAdjacentHTML('beforeend', `<div class="building-header">🏢 ${bu}</div>`);
            
            if (daily.length === 0) return list.insertAdjacentHTML('beforeend', '<div class="no-data">내역 없음</div>');

            if (currentView === 'list') {
                let table = `<table class="res-table"><thead><tr><th>장소</th><th>시간</th><th>행사명</th><th class="pc-only">상태</th></tr></thead><tbody>`;
                daily.forEach(ev => {
                    table += `<tr><td>${ev.placeNm}</td><td>${ev.startTime}~${ev.endTime}</td><td>${ev.eventNm}</td><td class="pc-only">${ev.status==='Y'?'확정':'대기'}</td></tr>`;
                });
                list.insertAdjacentHTML('beforeend', table + `</tbody></table>`);
            } else {
                daily.forEach(ev => {
                    list.insertAdjacentHTML('beforeend', `
                        <div class="res-card">
                            <span class="badge ${ev.status==='Y'?'badge-y':'badge-n'}">${ev.status==='Y'?'확정':'대기'}</span>
                            <div style="font-weight:800;">📍 ${ev.placeNm}</div>
                            <div style="font-size:13px; color:#64748b; margin-top:4px;">⏰ ${ev.startTime} ~ ${ev.endTime}</div>
                            <div style="margin-top:8px; font-size:14px;">${ev.eventNm}</div>
                        </div>`);
                });
            }
        });
    }

    window.onload = () => {
        initSubTabs();
        filterPhones();
        document.getElementById('rentDate').value = new Date().toISOString().split('T')[0];
        setView(window.innerWidth > 600 ? 'list' : 'card');
    };
</script>
</body>
</html>
